version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: reka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reka
      POSTGRES_PASSWORD: reka_dev_password
      POSTGRES_DB: reka
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reka-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: reka-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: reka
      RABBITMQ_DEFAULT_PASS: reka_dev_password
    ports:
      - "5672:5672"
      - "15672:15672"

  neo4j:
    image: neo4j:5-community
    container_name: reka-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/reka_dev_password
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
